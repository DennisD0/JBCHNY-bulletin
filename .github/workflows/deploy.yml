name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # needed for Workload Identity auth (if used instead of SA key)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/choir-player/app
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy choir-player \
            --image "us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/choir-player/app:${{ github.sha }}" \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 4Gi \
            --cpu 2 \
            --timeout 300 \
            --concurrency 5 \
            --min-instances 0 \
            --max-instances 2 \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Print service URL
        run: |
          URL=$(gcloud run services describe choir-player --region us-central1 --format 'value(status.url)' --project ${{ secrets.GCP_PROJECT_ID }})
          echo "✅ Live at: $URL"
